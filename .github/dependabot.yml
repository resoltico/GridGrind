version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gradle"
    directory: "/jazzer"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "gradle/actions"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
