name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          # On PRs, only read from the cache to avoid cache poisoning from untrusted code.
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run the supported whole-repo deterministic gate
        # Active fuzzing remains local-only. CI exercises only the deterministic nested Jazzer,
        # packaging, shell, and Docker stages shipped by the root check.sh contract.
        run: ./check.sh

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-24.04
    needs: check
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run Docker smoke separately so branch protection keeps an honest Docker-specific gate
        run: ./scripts/docker-smoke.sh

  devcontainer-changes:
    name: Detect devcontainer changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.filter.outputs.changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect devcontainer-relevant changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base" "${{ github.sha }}" -- \
            '.devcontainer' \
            'scripts/validate-devcontainer.sh' \
            'scripts/devcontainer-prepare-user-home.sh')
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  devcontainer:
    name: Contributor devcontainer
    needs: [devcontainer-changes]
    if: needs.devcontainer-changes.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate the committed contributor devcontainer surface
        run: ./scripts/validate-devcontainer.sh

  gate:
    name: Gate
    if: always()
    needs:
      - check
      - docker-smoke
      - devcontainer-changes
      - devcontainer
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Confirm aggregate gate success
        shell: bash
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          set -euo pipefail
          if echo "$RESULTS" | grep -q '"failure"'; then
            echo "A required job failed."
            exit 1
          fi
          if echo "$RESULTS" | grep -q '"cancelled"'; then
            echo "A required job was cancelled."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
