name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          # On PRs, only read from the cache to avoid cache poisoning from untrusted code.
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run the supported whole-repo deterministic gate
        # Active fuzzing remains local-only. CI exercises only the deterministic nested Jazzer,
        # packaging, shell, and Docker stages shipped by the root check.sh contract.
        run: ./check.sh

  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run Docker smoke separately so branch protection keeps an honest Docker-specific gate
        run: ./scripts/docker-smoke.sh

  devcontainer:
    name: Contributor devcontainer
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate the committed contributor devcontainer surface
        run: ./scripts/validate-devcontainer.sh
